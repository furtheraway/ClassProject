{% extends "base.html" %}

{% block title %}Edit profile · SUM 26001 Class Project{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-9 col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-1">Edit profile</h1>
        <p class="text-muted small mb-4">
          Fields marked “private” are visible only to you and the instructor.
        </p>
        <form method="post" novalidate>
          {% csrf_token %}
          {% include "partials/form_fields.html" %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save changes</button>
            <a class="btn btn-outline-secondary" href="{% url 'profile-detail' user.pk %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
