{% extends "base.html" %}

{% block title %}Password reset · ClassProject{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h1 class="h4 mb-3">Password changed</h1>
        <p class="mb-4">Your password has been reset. You can sign in with it now.</p>
        <a href="{% url 'login' %}" class="btn btn-primary">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
