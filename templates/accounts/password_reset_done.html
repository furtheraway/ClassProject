{% extends "base.html" %}

{% block title %}Reset link sent · ClassProject{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h1 class="h4 mb-3">Check your email</h1>
        <p>
          If an account exists for that address, a password-reset link is on its way.
        </p>
        <p class="text-muted small mb-4">Didn't get it? Check your spam folder.</p>
        <a href="{% url 'login' %}" class="btn btn-outline-primary">Back to sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
